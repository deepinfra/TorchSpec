# ─────────────────────────────────────────────────────────────────────────
# Per-run parameters for 20-workflow.yaml
#   argo submit deploy/argo/20-workflow.yaml --parameter-file deploy/argo/run_params.yaml
#
# Topology is fully list-driven: add/remove worker_specs entries to change the
# number of inference nodes; change the length of any UUID list to change GPU
# counts. Training GPUs, inference GPUs, per-node GPUs and the expected node
# count are all DERIVED automatically — there are no separate count knobs.
# (Inference nodes must be uniform: every worker needs the same GPU count, or
#  the gate step fails — run.sh's INFERENCE_GPUS_PER_NODE is a single value.)
#
# IMPORTANT — put the GPU UUIDs from `i reserve` in the lists below.
# NVIDIA_VISIBLE_DEVICES also accepts device indices, but UUIDs are the
# production-safe form (stable; indices can be reordered by the driver).
# Keep the reservation holder pods alive for the whole run.
# ─────────────────────────────────────────────────────────────────────────

# ── Trainer (Ray head). #GPUs = number of UUIDs listed here. ──
trainer_node: "<TRAINER_NODE>"            # e.g. di-slc-110
trainer_uuids: "<UUID1,UUID2,UUID3,UUID4>"   # list as many UUIDs as training GPUs you want

# ── Inference workers (one entry per node; #GPUs/node = number of UUIDs per entry). ──
# JSON array string so the DAG's withParam can fan out over it.
worker_specs: '[{"node":"<INFER_NODE_1>","uuids":"<UUID_A,UUID_B>"},{"node":"<INFER_NODE_2>","uuids":"<UUID_C,UUID_D>"},{"node":"<INFER_NODE_3>","uuids":"<UUID_E,UUID_F>"}]'

# ── Misc ──
# GPU counts and expected node count are derived automatically from the lists above.
image: "localhost:30500/torchspec:0.1.0-deploy"

# ── Checkpoint conversion: experiment dir under /data; convert picks the latest iter_* ──
convert_output_dir: "/data/torchspec-outputs/my_experiment"
