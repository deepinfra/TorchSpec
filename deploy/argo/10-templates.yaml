apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: torchspec-templates
  namespace: deepinfra
spec:
  templates:

  # ─────────────────────────────────────────────────────────────
  # Ray head (trainer). Daemon: stays up for the workflow, auto-torn-down.
  # ─────────────────────────────────────────────────────────────
  - name: ray-head
    daemon: true
    inputs:
      parameters:
      - { name: image,     value: "localhost:30500/torchspec:0.1.0-deploy" }
      - { name: node }                       # reserved trainer node (kubernetes.io/hostname)
      - { name: gpu_uuids }                  # comma-separated UUIDs; count == training GPUs (auto)
    metadata:
      labels: { app: torchspec, torchspec/role: head, model_manager_managed: "true" }
    podSpecPatch: |
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: "{{inputs.parameters.node}}"
      volumes:
      - name: data
        hostPath: { path: /data, type: Directory }
    container:
      image: "{{inputs.parameters.image}}"
      workingDir: /root/torchspec
      command: ["bash", "-lc"]
      args:                                                                          # --num-gpus = count of UUIDs in NVIDIA_VISIBLE_DEVICES
      - >
        NG=$(echo "$NVIDIA_VISIBLE_DEVICES" | tr ',' '\n' | grep -c .);
        ray start --head --port 6380 --num-gpus "$NG"
        --temp-dir /tmp/ray_$(id -u) --disable-usage-stats --block
      env:
      - { name: NVIDIA_VISIBLE_DEVICES, value: "{{inputs.parameters.gpu_uuids}}" }   # no nvidia.com/gpu request — matches production
      - name: MC_TCP_BIND_ADDRESS
        valueFrom: { fieldRef: { fieldPath: status.podIP } }                          # == node IP under hostNetwork
      securityContext:
        capabilities: { add: [IPC_LOCK, SYS_NICE] }                                  # IPC_LOCK also covers old --ulimit memlock=-1
      volumeMounts:
      - { name: data, mountPath: /data }
      readinessProbe:                                                                # "ready" only when the GCS actually answers
        exec: { command: ["bash", "-lc", "ray status >/dev/null 2>&1"] }
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 60
        timeoutSeconds: 5

  # ─────────────────────────────────────────────────────────────
  # Ray worker (inference node). Daemon. Attaches to the head.
  # ─────────────────────────────────────────────────────────────
  - name: ray-worker
    daemon: true
    inputs:
      parameters:
      - { name: image,     value: "localhost:30500/torchspec:0.1.0-deploy" }
      - { name: node }                       # reserved inference node
      - { name: gpu_uuids }                  # comma-separated UUIDs; count == GPUs on this node (auto)
      - { name: head_ip }                    # head pod IP (== trainer node IP)
    metadata:
      labels: { app: torchspec, torchspec/role: worker, model_manager_managed: "true" }
    podSpecPatch: |
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: "{{inputs.parameters.node}}"
      volumes:
      - name: data
        hostPath: { path: /data, type: Directory }
    container:
      image: "{{inputs.parameters.image}}"
      workingDir: /root/torchspec
      command: ["bash", "-lc"]
      args:                                                                          # --num-gpus = count of UUIDs in NVIDIA_VISIBLE_DEVICES
      - >
        NG=$(echo "$NVIDIA_VISIBLE_DEVICES" | tr ',' '\n' | grep -c .);
        ray start --address {{inputs.parameters.head_ip}}:6380 --num-gpus "$NG"
        --temp-dir /tmp/ray_$(id -u) --disable-usage-stats --block
      env:
      - { name: NVIDIA_VISIBLE_DEVICES, value: "{{inputs.parameters.gpu_uuids}}" }
      - name: MC_TCP_BIND_ADDRESS
        valueFrom: { fieldRef: { fieldPath: status.podIP } }
      - { name: RAY_ADDRESS, value: "{{inputs.parameters.head_ip}}:6380" }            # used by the readiness probe
      securityContext:
        capabilities: { add: [IPC_LOCK, SYS_NICE] }
      volumeMounts:
      - { name: data, mountPath: /data }
      readinessProbe:                                                                # "ready" once this worker can reach the cluster
        exec: { command: ["bash", "-lc", "ray status >/dev/null 2>&1"] }
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 60
        timeoutSeconds: 5

  # ─────────────────────────────────────────────────────────────
  # Training driver. Runs to completion; its exit code = run status.
  # Connects to the Ray cluster as a driver (actors run in the raylets).
  # ─────────────────────────────────────────────────────────────
  - name: train
    inputs:
      parameters:
      - { name: image,                value: "localhost:30500/torchspec:0.1.0-deploy" }
      - { name: node }                       # pin to the trainer node (same as head)
      - { name: gpu_uuids }                  # trainer UUIDs (visibility parity with the original single-container run)
      - { name: head_ip }
      - { name: training_node_ips }          # e.g. "[<head_ip>]"
      - { name: inference_node_ips }         # e.g. "[<w1>,<w2>,<w3>]"   (from gate)
      - { name: infer_gpus }                 # total inference GPUs       (from gate)
      - { name: infer_gpus_per_node }        # GPUs per inference node    (from gate)
      - { name: train_nodes,          value: "1" }
      - { name: tp_size,              value: "2" }
      - { name: mem_fraction,         value: "0.8" }
      - { name: mooncake_segment,     value: "128GB" }
      - { name: run_script,           value: "./examples/minimax-m27-4node-b200/run.sh" }
      - { name: config,               value: "configs/sglang_minimax_m27_4node.yaml" }
      - { name: draft_config,         value: "configs/draft_models/minimax_m27_eagle3.json" }
    metadata:
      labels: { app: torchspec, torchspec/role: train, model_manager_managed: "true" }
    podSpecPatch: |
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: "{{inputs.parameters.node}}"
      volumes:
      - name: data
        hostPath: { path: /data, type: Directory }
    container:
      image: "{{inputs.parameters.image}}"
      workingDir: /root/torchspec
      command: ["bash", "-lc"]
      args:                                                                          # TRAIN_GPUS = count of UUIDs in NVIDIA_VISIBLE_DEVICES
      - >
        NG=$(echo "$NVIDIA_VISIBLE_DEVICES" | tr ',' '\n' | grep -c .);
        TRAIN_NODES={{inputs.parameters.train_nodes}}
        TRAIN_GPUS="$NG"
        INFERENCE_GPUS={{inputs.parameters.infer_gpus}}
        INFERENCE_GPUS_PER_NODE={{inputs.parameters.infer_gpus_per_node}}
        TP_SIZE={{inputs.parameters.tp_size}}
        {{inputs.parameters.run_script}} {{inputs.parameters.config}}
        model.draft_model_config={{inputs.parameters.draft_config}}
        mooncake.global_segment_size={{inputs.parameters.mooncake_segment}}
        mooncake.protocol=tcp
        training.placement_strategy=custom
        training.training_node_ips={{inputs.parameters.training_node_ips}}
        inference.sglang.mem_fraction_static={{inputs.parameters.mem_fraction}}
        inference.inference_node_ips={{inputs.parameters.inference_node_ips}}
      env:
      - { name: NVIDIA_VISIBLE_DEVICES, value: "{{inputs.parameters.gpu_uuids}}" }
      - { name: RAY_ADDRESS,            value: "{{inputs.parameters.head_ip}}:6380" }
      - name: MC_TCP_BIND_ADDRESS
        valueFrom: { fieldRef: { fieldPath: status.podIP } }
      securityContext:
        capabilities: { add: [IPC_LOCK, SYS_NICE] }
      volumeMounts:
      - { name: data, mountPath: /data }

  # ─────────────────────────────────────────────────────────────
  # Checkpoint conversion to HF. Runs after train; reads from /data.
  # ─────────────────────────────────────────────────────────────
  - name: convert-to-hf
    inputs:
      parameters:
      - { name: image,      value: "localhost:30500/torchspec:0.1.0-deploy" }
      - { name: node }                       # trainer node (where checkpoints live on /data)
      - { name: output_dir }                 # experiment dir under /data containing iter_* subdirs
    metadata:
      labels: { app: torchspec, torchspec/role: convert, model_manager_managed: "true" }
    podSpecPatch: |
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: "{{inputs.parameters.node}}"
      volumes:
      - name: data
        hostPath: { path: /data, type: Directory }
    container:
      image: "{{inputs.parameters.image}}"
      workingDir: /root/torchspec
      command: ["bash", "-lc"]
      args:                                  # pick the latest iter_* checkpoint (zero-padded → lexical sort == numeric)
      - >
        base="{{inputs.parameters.output_dir}}";
        last="$(ls -d "$base"/iter_* 2>/dev/null | sort | tail -n1)";
        if [ -z "$last" ]; then echo "no iter_* checkpoint under $base" >&2; exit 1; fi;
        echo "converting latest checkpoint: $last";
        python tools/convert_to_hf.py --input-dir "$last"
      volumeMounts:
      - { name: data, mountPath: /data }

  # ─────────────────────────────────────────────────────────────
  # Readiness gate + IP discovery. Waits until the Ray cluster has the
  # expected number of live nodes, then emits the worker IPs formatted
  # as run.sh's inference_node_ips (e.g. "[ip1,ip2,ip3]").
  # Runs on the trainer node; connects to the head GCS as a driver.
  # ─────────────────────────────────────────────────────────────
  - name: gate-and-discover
    inputs:
      parameters:
      - { name: image,        value: "localhost:30500/torchspec:0.1.0-deploy" }
      - { name: node }                       # trainer node (same as head)
      - { name: head_ip }
      - { name: worker_specs }               # same JSON the DAG fans out over; count → expected workers
      - { name: timeout_secs, value: "900" }
    podSpecPatch: |
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: "{{inputs.parameters.node}}"
    outputs:
      parameters:
      - name: inference_node_ips             # "[ip1,ip2,ip3]" — feeds train.inference_node_ips
        valueFrom: { path: /tmp/inference_node_ips }
      - name: infer_gpus                     # total inference GPUs — feeds train.infer_gpus
        valueFrom: { path: /tmp/infer_gpus }
      - name: infer_gpus_per_node            # GPUs per inference node — feeds train.infer_gpus_per_node
        valueFrom: { path: /tmp/infer_gpus_per_node }
    script:
      image: "{{inputs.parameters.image}}"
      command: ["python3"]
      env:
      - { name: RAY_ADDRESS,  value: "{{inputs.parameters.head_ip}}:6380" }
      - { name: HEAD_IP,      value: "{{inputs.parameters.head_ip}}" }
      - { name: WORKER_SPECS, value: "{{inputs.parameters.worker_specs}}" }
      - { name: TIMEOUT_SECS, value: "{{inputs.parameters.timeout_secs}}" }
      source: |
        import os, sys, time, json, ray
        addr = os.environ["RAY_ADDRESS"]
        head_ip = os.environ["HEAD_IP"]
        expected = len(json.loads(os.environ["WORKER_SPECS"])) + 1   # workers + head
        deadline = time.time() + int(os.environ["TIMEOUT_SECS"])
        ray.init(address=addr)
        while True:
            alive = [n for n in ray.nodes() if n.get("Alive")]
            if len(alive) >= expected:
                break
            if time.time() > deadline:
                sys.stderr.write(
                    "timeout: only %d/%d ray nodes alive\n" % (len(alive), expected))
                sys.exit(1)
            time.sleep(5)
        # workers = every live node except the head
        workers = [n for n in alive if n["NodeManagerAddress"] != head_ip]
        worker_ips = [n["NodeManagerAddress"] for n in workers]
        gpus_per = [int(n.get("Resources", {}).get("GPU", 0)) for n in workers]
        per_node = gpus_per[0] if gpus_per else 0
        if any(g != per_node for g in gpus_per):
            sys.stderr.write(
                "ERROR: non-uniform inference GPU counts %s; run.sh needs a constant "
                "INFERENCE_GPUS_PER_NODE\n" % gpus_per)
            sys.exit(1)
        infer_gpus = sum(gpus_per)
        inference_node_ips = "[" + ",".join(worker_ips) + "]"
        for path, val in [("/tmp/inference_node_ips", inference_node_ips),
                          ("/tmp/infer_gpus", str(infer_gpus)),
                          ("/tmp/infer_gpus_per_node", str(per_node))]:
            with open(path, "w") as f:
                f.write(val)
        print("cluster ready: %d nodes; inference_node_ips=%s infer_gpus=%d per_node=%d"
              % (len(alive), inference_node_ips, infer_gpus, per_node))
